name: idalib-tests
on:
  workflow_dispatch:

jobs:
  idalib-tests:
    # Run on all pushes, but only run pull_request_target for fork PRs so
    # same-repo contributors use normal push CI and only external contributors
    # require manual approval via the external-pr environment.
    if: |
      github.event_name == 'push' ||
      (
        github.event_name == 'pull_request_target' &&
        github.event.pull_request.head.repo.full_name != github.repository
      )
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'pull_request_target' && 'external-pr' || '' }}
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/mrexodia/ida-docker/ida:9.1
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

      - uses: astral-sh/setup-uv@v7

      - name: Run tests
        run: |
          uv run ida-mcp-test tests/crackme03.elf -q
          uv run ida-mcp-test tests/typed_fixture.elf -q
