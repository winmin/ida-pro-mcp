name: idalib-tests
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  idalib-tests:
    # This workflow depends on the upstream GHCR image and is noisy/broken on
    # forks. Keep it active only for the canonical upstream repository.
    if: github.repository == 'mrexodia/ida-pro-mcp'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ida-version: ['9.0', '9.1', '9.2', '9.3']
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/mrexodia/ida-docker/ida:${{ matrix.ida-version }}
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7

      - name: Run tests
        run: |
          uv run ida-mcp-test tests/crackme03.elf -q
          uv run ida-mcp-test tests/typed_fixture.elf -q
